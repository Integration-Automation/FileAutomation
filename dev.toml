# Dev release metadata — copied to pyproject.toml by the dev publish workflow.
[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "automation_file_dev"
version = "0.0.34"
authors = [
    { name = "JE-Chen", email = "zenmailman@gmail.com" },
]
description = "JSON-driven file, Drive, and cloud automation framework (dev channel)."
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "google-api-python-client>=2.100.0",
    "google-auth-httplib2>=0.2.0",
    "google-auth-oauthlib>=1.2.0",
    "requests>=2.31.0",
    "tqdm>=4.66.0",
    "boto3>=1.34.0",
    "azure-storage-blob>=12.19.0",
    "dropbox>=11.36.2",
    "paramiko>=3.4.0",
    "PySide6>=6.6.0",
    "watchdog>=4.0.0",
    "cryptography>=42.0.0",
    "prometheus_client>=0.20.0",
    "tomli>=2.0.1; python_version<\"3.11\""
]
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Development Status :: 2 - Pre-Alpha",
    "Environment :: Win32 (MS Windows)",
    "Environment :: MacOS X",
    "Environment :: X11 Applications",
    "Operating System :: OS Independent"
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.6.0",
    "mypy>=1.11.0",
    "pre-commit>=3.7.0",
    "build>=1.2.0",
    "twine>=5.1.0"
]

[project.urls]
"Homepage" = "https://github.com/JE-Chen/Integration-testing-environment"

[tool.setuptools.packages]
find = { namespaces = false }
