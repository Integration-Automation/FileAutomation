# Dev release metadata — copied to pyproject.toml by the dev publish workflow.
[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "automation_file_dev"
version = "0.0.33"
authors = [
    { name = "JE-Chen", email = "zenmailman@gmail.com" },
]
description = "JSON-driven file, Drive, and cloud automation framework (dev channel)."
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "google-api-python-client",
    "google-auth-httplib2",
    "google-auth-oauthlib",
    "requests",
    "tqdm"
]
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Development Status :: 2 - Pre-Alpha",
    "Environment :: Win32 (MS Windows)",
    "Environment :: MacOS X",
    "Environment :: X11 Applications",
    "Operating System :: OS Independent"
]

[project.optional-dependencies]
s3 = ["boto3"]
azure = ["azure-storage-blob"]
dropbox = ["dropbox"]
sftp = ["paramiko"]
dev = ["pytest", "pytest-cov", "ruff", "mypy", "pre-commit"]

[project.urls]
"Homepage" = "https://github.com/JE-Chen/Integration-testing-environment"

[tool.setuptools.packages]
find = { namespaces = false }
